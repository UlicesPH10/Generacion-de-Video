services:
  - type: web
    name: generacion-de-video-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false   # Se configura manualmente en el dashboard de Render
